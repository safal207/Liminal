name: LIMINAL Production Deployment

on:
  push:
    branches:
      - main
      - production
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  deployment-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deployment status
        run: |
          echo "Production deployment is intentionally disabled."
          echo "Keep this workflow as a non-deploying placeholder until staging/production environments, secrets, and smoke-test targets are configured."
          echo "Pull requests should be validated by CI and smoke/integration workflows, not by production deployment."
